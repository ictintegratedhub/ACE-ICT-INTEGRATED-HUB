backend:
  name: github
  repo: ictintegratedhub/ACE-ICT-INTEGRATED-HUB
  branch: main
  base_url: https://sveltia-cms-auth.ictintegratedhub.workers.dev
  auth:
    client_id: Ov23liThFQAMDEEpIU82

media_folder: static/images/uploads
public_folder: /static/images/uploads

collections:
  - name: posts
    label: Blog Posts
    folder: content/posts
    create: true
    extension: md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
      - name: thumbnail
        label: Thumbnail Image
        widget: image
        required: false
        hint: "Upload a thumbnail image for the blog card"
      - name: body
        label: Body
        widget: markdown