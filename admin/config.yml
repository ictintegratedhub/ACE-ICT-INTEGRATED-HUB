backend:
  name: github
  repo: ictintegratedhub/ACE-ICT-INTEGRATED-HUB
  branch: main
  base_url: https://sveltia-cms-auth.ictintegratedhub.workers.dev
  auth:
    client_id: Ov23liThFQAMDEEpIU82

media_folder: static/media
public_folder: /static/media

collections:
  - name: posts
    label: Blog Posts
    folder: content/posts
    create: true
    extension: md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
      - name: body
        label: Body
        widget: markdown