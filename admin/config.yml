backend:
  name: github
  repo: ictintegratedhub/ACE-ICT-INTEGRATED-HUB
  branch: main
  base_url: hhttps://sveltia-cms-auth.ictintegratedhub.workers.dev/

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    extension: "md"
    format: "yaml-frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
      - label: "Body"
        name: "body"
        widget: "markdown"

