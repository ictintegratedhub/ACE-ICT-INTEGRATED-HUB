backend:
  name: github
  repo: ictintegratedhub/ACE-ICT-INTEGRATED-HUB
  branch: main
  # Remove auth_type and app_id - they're not needed for PAT

media_folder: static/images/uploads
public_folder: /static/images/uploads

collections:
  - name: posts
    label: Blog Posts
    folder: content/posts
    create: true
    extension: md
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        widget: string
      - name: date
        label: Date
        widget: datetime
      - name: categories
        label: Categories
        widget: list
        allow_add: true
        default: ["Tech"]
        field:
          label: Category
          name: category
          widget: string
      - name: thumbnail
        label: Thumbnail Image
        widget: image
        required: false
      - name: body
        label: Body
        widget: markdown