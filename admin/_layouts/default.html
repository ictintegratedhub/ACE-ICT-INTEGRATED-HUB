<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  
  <!-- Optional: Add your existing CSS links here -->
  
  <!-- Meta tags -->
  <meta name="description" content="{{ page.excerpt | default: site.description }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
</head>
<body>
  <!-- Header / Navigation -->
  <header>
    <nav>
      <div class="container">
        <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
          <li><a href="{{ '/about' | relative_url }}">About</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Main Content - This is where page content gets injected -->
  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
