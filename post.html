<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - ICT Integrated Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1a1a1a;
            --secondary-dark: #2c1e0f;
            --gold-accent: #d4af37;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-dark);
            color: #fff;
            line-height: 1.8;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .post-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 30px;
        }
        .post-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            color: var(--gold-accent);
            margin: 20px 0;
        }
        .post-date {
            color: #aaa;
            font-size: 0.9rem;
        }
        .post-content {
            font-size: 1.1rem;
            color: #ddd;
        }
        .post-content h2, .post-content h3 {
            color: var(--gold-accent);
            margin-top: 30px;
        }
        .post-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--gold-accent);
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 60px;
        }
        header, footer {
            background: var(--primary-dark);
            padding: 15px 25px;
            text-align: center;
        }
        .btn-back {
            background: var(--gold-accent);
            color: var(--primary-dark);
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" style="color: var(--gold-accent); text-decoration: none; font-size: 1.5rem; font-weight: 700;">ICT Integrated Hub</a>
    </header>

    <div class="container" id="post-container">
        <div class="loading">
            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--gold-accent);"></i>
            <p>Loading post...</p>
        </div>
    </div>

    <footer style="text-align: center; padding: 30px;">
        <a href="/#blog" class="btn-back">← Back to Blog</a>
    </footer>

    <script>
    // Get post filename from URL
    const urlParams = new URLSearchParams(window.location.search);
    const postFile = urlParams.get('post');
    
    async function loadPost() {
        if (!postFile) {
            document.getElementById('post-container').innerHTML = '<div class="loading"><p>No post specified.</p><a href="/#blog" class="btn-back">Back to Blog</a></div>';
            return;
        }
        
        try {
            const response = await fetch(`https://raw.githubusercontent.com/ictintegratedhub/ACE-ICT-INTEGRATED-HUB/main/content/posts/${postFile}`);
            let markdown = await response.text();
            
            // Parse frontmatter and content
            let title = postFile.replace('.md', '').replace(/-/g, ' ');
            let date = '';
            let thumbnail = '';
            let content = markdown;
            
            // Extract YAML frontmatter
            const frontmatterMatch = markdown.match(/^---\n([\s\S]*?)\n---/);
            if (frontmatterMatch) {
                const frontmatter = frontmatterMatch[1];
                const titleMatch = frontmatter.match(/title:\s*(.+)/i);
                if (titleMatch) title = titleMatch[1];
                const dateMatch = frontmatter.match(/date:\s*(.+)/i);
                if (dateMatch) date = new Date(dateMatch[1]).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                
                // Extract thumbnail
                const thumbnailMatch = frontmatter.match(/thumbnail:\s*(.+)/i);
                if (thumbnailMatch) {
                    let thumbnailPath = thumbnailMatch[1].trim().replace(/^["']|["']$/g, '');
                    if (thumbnailPath && !thumbnailPath.startsWith('http')) {
                        thumbnail = `https://raw.githubusercontent.com/ictintegratedhub/ACE-ICT-INTEGRATED-HUB/main/${thumbnailPath}`;
                    } else {
                        thumbnail = thumbnailPath;
                    }
                }
                
                content = markdown.replace(/^---\n[\s\S]*?\n---/, '').trim();
            }
            
            // Simple Markdown to HTML conversion
            let html = content
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" style="max-width:100%; border-radius:10px; margin:20px 0;">')
                .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" style="color: var(--gold-accent);">$1</a>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            html = `<p>${html}</p>`.replace(/<p><\/p>/g, '');
            
            // Build the post HTML with thumbnail at the top if exists
            document.getElementById('post-container').innerHTML = `
                <div class="post-header">
                    ${thumbnail ? `
                        <div style="margin-bottom: 30px; border-radius: 20px; overflow: hidden;">
                            <img src="${thumbnail}" alt="${escapeHtml(title)}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 20px;">
                        </div>
                    ` : ''}
                    <h1 class="post-title">${escapeHtml(title)}</h1>
                    <div class="post-date"><i class="fas fa-calendar-alt"></i> ${date || 'Recent'}</div>
                </div>
                <div class="post-content">${html}</div>
            `;
            
        } catch (error) {
            document.getElementById('post-container').innerHTML = `<div class="loading"><p>Post not found.</p><a href="/#blog" class="btn-back">Back to Blog</a></div>`;
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    loadPost();
</script>
</body>
</html>
