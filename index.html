        * {

        }

        nav ul li a::after {
            content: '';

            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gold-accent);
            transition: width 0.3s ease;
        }

        nav ul li a:hover::after,
        nav ul li a.active::after {
            width: 100%;
        }

            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote-icon i {
            color: var(--primary-dark);
            transform: rotate(45deg);
        }

        .stats-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
        }

        .stat-badge {
            background: var(--secondary-dark);
            color: var(--gold-accent);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid var(--gold-accent);
            transition: var(--transition-default);
        }

        .stat-badge:hover {
            background: var(--gold-accent);
            color: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* CTA Section - Actual Content */
        .cta-section {
            text-align: center;
            padding: 100px 5%;
            background: linear-gradient(135deg, var(--secondary-dark), var(--primary-dark));
            margin-top: 40px;
        }

        .cta-section h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 20px;
        }

        .cta-section p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .btn-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--btn-color);
            color: #fff;
            padding: 16px 48px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition-default);
            cursor: pointer;
        }

        .btn-cta:hover {
            background: var(--btn-hover);
            transform: translateY(-4px) scale(1.05);
            gap: 15px;
        }

        /* Footer - Actual Content */
        footer {
            background: #0d0d0d;
            padding: 60px 5% 30px;
            text-align: center;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .footer-logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-accent), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-default);
        }

        .footer-links a:hover {
            color: var(--gold-accent);
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .footer-social a {
            color: var(--text-muted);
            font-size: 1.3rem;
            transition: var(--transition-default);
        }

        .footer-social a:hover {
            color: var(--gold-accent);
            transform: translateY(-3px);
        }

        .copyright {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 30px;
        }

        /* Skip Link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--gold-accent);
            color: var(--primary-dark);
            padding: 8px 16px;
            text-decoration: none;
            z-index: 1001;
        }

        .skip-link:focus {
            top: 0;
        }

        @media (min-width: 992px) {
            #services, #about {
                padding: 100px 8%;
            }
            footer {
                padding: 60px 8% 30px;
            }
        }
    </style>
</head>
